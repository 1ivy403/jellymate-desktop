<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>水母游动 · 预览</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#07111f; overflow:hidden;
    width:100vw; height:100vh;
    font-family:"PingFang SC",sans-serif; user-select:none;
  }

  #jelly {
    position:fixed;
    width:200px; height:300px;
    cursor:grab;
  }
  #jelly.dragging { cursor:grabbing; }

  /* 整体旋转层 */
  #rot-wrap { width:100%; height:100%; }

  /* 飘浮动画：拖动时暂停 */
  #float-wrap {
    width:100%; height:100%;
    animation:float 6s ease-in-out infinite;
  }
  #jelly.dragging #float-wrap { animation-play-state:paused; }
  @keyframes float {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-16px);}
  }

  .bell {
    position:absolute; left:50%; top:40px;
    transform:translateX(-50%);
    width:140px; height:120px;
    background:radial-gradient(ellipse at 50% 35%,
      #bdeef5 0%, #7fd8e8 45%, #4a9fc4 100%);
    border-radius:50% 50% 44% 44%/62% 62% 38% 38%;
    opacity:.92;
    box-shadow:0 0 36px rgba(127,216,232,.6);
    animation:pulse 6s ease-in-out infinite;
  }
  #jelly.dragging .bell { animation-play-state:paused; }
  @keyframes pulse {
    0%,100%{transform:translateX(-50%) scaleY(1) scaleX(1);}
    50%{transform:translateX(-50%) scaleY(.9) scaleX(1.06);}
  }
  .bell::after {
    content:""; position:absolute; left:50%; top:24px;
    transform:translateX(-50%);
    width:80px; height:58px; border-radius:50%;
    background:radial-gradient(ellipse,rgba(255,255,255,.4),transparent 70%);
  }

  .eyes {
    position:absolute; left:50%; top:86px;
    display:flex; gap:26px; transform:translateX(-50%);
    pointer-events:none;
  }
  .eye {
    width:11px; height:14px; background:#0a1228;
    border-radius:50%; animation:blink 5.5s infinite;
  }
  @keyframes blink{0%,94%,100%{transform:scaleY(1);}97%{transform:scaleY(.1);}}

  .cheeks {
    position:absolute; left:50%; top:104px;
    transform:translateX(-50%); display:flex; gap:62px; pointer-events:none;
  }
  .cheek { width:15px; height:9px; background:rgba(255,150,170,.5); border-radius:50%; }

  .tentacles {
    position:absolute; left:50%; top:150px;
    transform:translateX(-50%); width:130px; height:130px; pointer-events:none;
  }
  .tent {
    position:absolute; top:0; width:5px;
    background:linear-gradient(#7fd8e8,transparent);
    border-radius:3px; transform-origin:top center;
    animation:sway 4.5s ease-in-out infinite;
  }
  .tent:nth-child(1){left:14px;height:96px;animation-delay:0s;}
  .tent:nth-child(2){left:38px;height:118px;animation-delay:.4s;}
  .tent:nth-child(3){left:62px;height:104px;animation-delay:.8s;}
  .tent:nth-child(4){left:86px;height:120px;animation-delay:1.2s;}
  .tent:nth-child(5){left:110px;height:92px;animation-delay:1.6s;}
  @keyframes sway{0%,100%{transform:rotate(-9deg);}50%{transform:rotate(9deg);}}

  #hint {
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    font-size:11px; color:rgba(127,216,232,.22);
    letter-spacing:1.5px; pointer-events:none; text-align:center; line-height:2;
  }
</style>
</head>
<body>

<div id="jelly">
  <div id="rot-wrap">
    <div id="float-wrap">
      <div class="bell"></div>
      <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
      <div class="cheeks"><div class="cheek"></div><div class="cheek"></div></div>
      <div class="tentacles">
        <div class="tent"></div><div class="tent"></div><div class="tent"></div>
        <div class="tent"></div><div class="tent"></div>
      </div>
    </div>
  </div>
</div>

<div id="hint">拖我游动 · 画圈就跟着转</div>

<script>
const jelly   = document.getElementById('jelly');
const rotWrap = document.getElementById('rot-wrap');

const W = window.innerWidth, H = window.innerHeight;
let jellyX = W/2 - 100, jellyY = H/2 - 150;
jelly.style.left = jellyX + 'px';
jelly.style.top  = jellyY + 'px';

// ── 拖拽 ──
let dragging = false, grabOffX = 0, grabOffY = 0;

// ── 参考点（极慢跟随水母）──
let refX = jellyX + 100, refY = jellyY + 150;
const REF_RATE = 0.015;

// ── 旋转弹簧 ──
let rot = 0, rotV = 0;
const K = 0.020, D = 0.88;

// ── 转圈检测：累计同向角度，需 ≥ 720° 才解锁（2 整圈）──
const MAX_TILT   = 6;    // 普通模式最大倾斜度（极微小）
let spinMode     = 0;    // 0=普通 1=转圈，平滑值
let accAngle     = 0;    // 同方向累计角度（方向反转即清零）
let lastAngSign  = 0;    // 上一帧的转向符号
let prevDx = 0, prevDy = 0;

function shortDiff(from, to){
  let d = to - from;
  while(d >  180) d -= 360;
  while(d < -180) d += 360;
  return d;
}

function resetSpin(){
  spinMode = 0; accAngle = 0; lastAngSign = 0;
  prevDx = 0; prevDy = 0;
}

jelly.addEventListener('mousedown', e => {
  if(e.button !== 0) return;
  dragging = true;
  jelly.classList.add('dragging');
  const r = jelly.getBoundingClientRect();
  grabOffX = e.clientX - r.left;
  grabOffY = e.clientY - r.top;
  refX = jellyX + 100;
  refY = jellyY + 150;
  resetSpin();
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if(!dragging) return;
  jellyX = e.clientX - grabOffX;
  jellyY = e.clientY - grabOffY;
  jelly.style.left = jellyX + 'px';
  jelly.style.top  = jellyY + 'px';
});

document.addEventListener('mouseup', () => {
  dragging = false;
  jelly.classList.remove('dragging');
  resetSpin();
});

function loop(){
  const cx = jellyX + 100, cy = jellyY + 150;

  let targetRot;
  if(dragging){
    refX += (cx - refX) * REF_RATE;
    refY += (cy - refY) * REF_RATE;
    const dx = cx - refX, dy = cy - refY;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if(dist > 10 && (prevDx !== 0 || prevDy !== 0)){
      // 位移向量相对上一帧的角变化量
      const cross  = prevDx * dy - prevDy * dx;
      const dot    = prevDx * dx + prevDy * dy;
      const angVel = Math.atan2(cross, dot) * 180 / Math.PI; // 度/帧

      const sign = Math.sign(cross);
      if(sign !== 0 && Math.abs(angVel) > 0.8){
        if(lastAngSign !== 0 && sign !== lastAngSign){
          // 方向反转：清零（横向晃动会在这里不断重置）
          accAngle = 0;
        } else {
          accAngle += Math.abs(angVel);
        }
        lastAngSign = sign;
      }

      // 累计 720° = 2 完整圈才解锁转圈姿态
      if(accAngle >= 720) spinMode = 1.0;

      prevDx = dx; prevDy = dy;
    } else if(dist > 10){
      prevDx = dx; prevDy = dy;
    }

    if(dist > 10){
      const fullAngle = Math.atan2(dx, -dy) * 180 / Math.PI;
      if(spinMode > 0.3){
        targetRot = fullAngle; // 转圈模式：完整跟随
      } else {
        // 普通模式：硬限 ±MAX_TILT，非常微小的侧倾
        const raw = shortDiff(0, fullAngle);
        const clamped = Math.max(-MAX_TILT, Math.min(MAX_TILT, raw));
        targetRot = rot + shortDiff(rot, clamped);
      }
    } else {
      targetRot = rot;
    }
  } else {
    refX += (cx - refX) * 0.08;
    refY += (cy - refY) * 0.08;
    prevDx = 0; prevDy = 0;
    targetRot = 0;
  }

  // 转圈模式缓慢衰减
  spinMode *= 0.975;

  const diff = shortDiff(rot, targetRot);
  rotV += diff * K;
  rotV *= D;
  rot  += rotV;

  rotWrap.style.transform = `rotate(${rot.toFixed(2)}deg)`;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
