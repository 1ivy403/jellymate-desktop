<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JellyMate</title>
<style>
  /* CSS变量类型注册——让水母颜色可以过渡动画 */
  @property --bell-hi  { syntax: '<color>';  inherits: true; initial-value: #bdeef5; }
  @property --bell-mid { syntax: '<color>';  inherits: true; initial-value: #7fd8e8; }
  @property --bell-lo  { syntax: '<color>';  inherits: true; initial-value: #4a9fc4; }
  @property --aura     { syntax: '<length>'; inherits: true; initial-value: 34px; }
  @property --aura-c   { syntax: '<color>';  inherits: true; initial-value: rgba(127,216,232,.5); }

  :root{
    --glow:#7fd8e8;--glow-soft:#a8e6ef;
    --ink:#dce7f5;--ink-dim:#8fa4c4;
    --panel:rgba(18,30,58,.88);
    --line:rgba(127,216,232,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  /* 全透明背景——鼠标由 main.js 控制穿透 */
  html,body{
    height:100%;width:100%;overflow:hidden;
    background:transparent!important;
    font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    color:var(--ink);user-select:none;
  }

  /* ══════════════ 水母主体 ══════════════ */
  #jelly-wrap{
    position:fixed;width:200px;height:300px;
    cursor:grab;z-index:50;
    opacity:.8;
    transition:opacity .8s ease,
               --bell-hi 1.6s cubic-bezier(.16,1,.3,1),
               --bell-mid 1.6s cubic-bezier(.16,1,.3,1),
               --bell-lo  1.6s cubic-bezier(.16,1,.3,1),
               --aura     1.6s cubic-bezier(.16,1,.3,1),
               --aura-c   1.6s cubic-bezier(.16,1,.3,1);
    will-change:left,top;
  }
  #jelly-wrap:active{cursor:grabbing;}

  #jelly-float{
    width:100%;height:100%;
    animation:float 6s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes float{0%,100%{transform:translateY(0) rotate(-1.5deg);}50%{transform:translateY(-22px) rotate(1.5deg);}}

  .bell{
    position:absolute;left:50%;top:40px;transform:translateX(-50%);
    width:140px;height:120px;
    background:radial-gradient(ellipse at 50% 35%,
      var(--bell-hi,#bdeef5) 0%,var(--bell-mid,#7fd8e8) 45%,var(--bell-lo,#4a9fc4) 100%);
    border-radius:50% 50% 44% 44%/62% 62% 38% 38%;
    opacity:.92;
    box-shadow:0 0 var(--aura,38px) var(--aura-c,rgba(127,216,232,.55));
    animation:pulse 6s ease-in-out infinite;
    transition:background 1.6s cubic-bezier(.16,1,.3,1),
               box-shadow  1.6s cubic-bezier(.16,1,.3,1);
    pointer-events:none;
  }
  @keyframes pulse{0%,100%{transform:translateX(-50%) scaleY(1) scaleX(1);}50%{transform:translateX(-50%) scaleY(.9) scaleX(1.06);}}
  .bell::after{
    content:"";position:absolute;left:50%;top:24px;transform:translateX(-50%);
    width:80px;height:58px;border-radius:50%;
    background:radial-gradient(ellipse,rgba(255,255,255,.4),transparent 70%);
  }
  .eyes{
    position:absolute;left:50%;top:86px;
    display:flex;gap:26px;z-index:3;pointer-events:none;
    transition:transform .12s ease;
  }
  .eye{width:11px;height:14px;background:#0a1228;border-radius:50%;animation:blink 5.5s infinite;transition:transform .12s ease;}
  @keyframes blink{0%,94%,100%{transform:scaleY(1);}97%{transform:scaleY(.1);}}
  .cheeks{position:absolute;left:50%;top:104px;transform:translateX(-50%);display:flex;gap:62px;z-index:2;pointer-events:none;}
  .cheek{width:15px;height:9px;background:rgba(255,150,170,.5);border-radius:50%;}
  .tentacles{position:absolute;left:50%;top:150px;transform:translateX(-50%);width:130px;height:130px;pointer-events:none;}
  .tent{
    position:absolute;top:0;width:5px;
    background:linear-gradient(var(--bell-mid,#7fd8e8),transparent);
    border-radius:3px;transform-origin:top center;
    animation:sway 4.5s ease-in-out infinite;
    transition:background 1.6s cubic-bezier(.16,1,.3,1);
  }
  .tent:nth-child(1){left:14px;animation-delay:0s;height:96px;}
  .tent:nth-child(2){left:38px;animation-delay:.4s;height:118px;}
  .tent:nth-child(3){left:62px;animation-delay:.8s;height:104px;}
  .tent:nth-child(4){left:86px;animation-delay:1.2s;height:120px;}
  .tent:nth-child(5){left:110px;animation-delay:1.6s;height:92px;}
  @keyframes sway{0%,100%{transform:rotate(-9deg);}50%{transform:rotate(9deg);}}

  /* ── Mood ── */
  .mood-calm   {--bell-hi:#bdeef5;--bell-mid:#7fd8e8;--bell-lo:#4a9fc4;--aura:34px;--aura-c:rgba(127,216,232,.5);}
  .mood-curious{--bell-hi:#bdeef5;--bell-mid:#7fd8e8;--bell-lo:#4a9fc4;--aura:44px;--aura-c:rgba(127,216,232,.65);}
  .mood-focus  {--bell-hi:#fff0c4;--bell-mid:#ffd980;--bell-lo:#d49a3a;--aura:60px;--aura-c:rgba(255,217,128,.7);}
  .mood-sleepy {--bell-hi:#d6d0ee;--bell-mid:#9a8fd0;--bell-lo:#5d5290;--aura:24px;--aura-c:rgba(154,143,208,.4);}
  .mood-happy  {--bell-hi:#ffd6e6;--bell-mid:#ff9ec4;--bell-lo:#d4537e;--aura:70px;--aura-c:rgba(255,158,196,.75);}
  .mood-poked  {--bell-hi:#ffe0c4;--bell-mid:#ffb060;--bell-lo:#d46010;--aura:55px;--aura-c:rgba(255,165,80,.72);}

  .mood-sleepy .bell{animation:pulse-sleepy 8s ease-in-out infinite!important;}
  @keyframes pulse-sleepy{0%,100%{transform:translateX(-50%) scaleY(1);}60%{transform:translateX(-50%) scaleY(.94) translateY(4px);}}
  .mood-sleepy .eye{animation:blink-sleepy 3s infinite;}
  @keyframes blink-sleepy{0%,50%{transform:scaleY(1);}55%,100%{transform:scaleY(.15);}}

  #jelly-wrap.dragging #jelly-float,
  #jelly-wrap.dragging .bell{animation-play-state:paused;}
  #jelly-wrap.pressing .bell{transform:translateX(-50%) scaleY(.80) scaleX(1.14)!important;animation:none!important;}
  #jelly-wrap.pressing #jelly-float{animation-play-state:paused;}

  #jelly-wrap.poked .bell{animation:poked-wobble .7s ease-in-out!important;}
  @keyframes poked-wobble{
    0%  {transform:translateX(-50%) rotate(0) scaleX(1) scaleY(1);}
    12% {transform:translateX(-50%) rotate(-18deg) scaleX(1.18) scaleY(.82);}
    28% {transform:translateX(-50%) rotate(15deg) scaleX(.82) scaleY(1.18);}
    43% {transform:translateX(-50%) rotate(-10deg) scaleX(1.12) scaleY(.88);}
    58% {transform:translateX(-50%) rotate(7deg) scaleX(.92) scaleY(1.1);}
    72% {transform:translateX(-50%) rotate(-4deg) scaleX(1.05) scaleY(.96);}
    100%{transform:translateX(-50%) rotate(0) scaleX(1) scaleY(1);}
  }
  #jelly-wrap.poked .eyes .eye:first-child{transform:translateX(5px) scaleY(.6)!important;animation:none!important;}
  #jelly-wrap.poked .eyes .eye:last-child {transform:translateX(-5px) scaleY(.6)!important;animation:none!important;}

  #jelly-wrap.near .bell{box-shadow:0 0 60px rgba(127,216,232,.75),0 0 120px rgba(127,216,232,.3)!important;}
  #jelly-wrap.faded{opacity:.28!important;}
  #jelly-wrap.spin #jelly-float{animation:float 6s ease-in-out infinite,spin 1.4s ease-in-out;}
  @keyframes spin{0%{transform:rotate(0);}100%{transform:rotate(360deg);}}

  #jelly-wrap.tut-active::after{
    content:"";position:absolute;inset:-12px;border-radius:50% 50% 44% 44%/60% 60% 40% 40%;
    border:2px solid rgba(127,216,232,.6);pointer-events:none;
    animation:tut-ring 1.8s ease-out infinite;
  }
  @keyframes tut-ring{0%{transform:scale(1);opacity:.8;}100%{transform:scale(1.45);opacity:0;}}
  #jelly-wrap.tut-success .bell{box-shadow:0 0 90px rgba(127,216,232,.9),0 0 160px rgba(127,216,232,.5)!important;}

  /* ── 气泡 ── */
  #bubble{
    position:absolute;left:-60px;top:4px;
    background:rgba(231,247,250,.95);color:#0a2540;
    font-size:13px;padding:10px 15px;
    border-radius:15px 15px 15px 4px;
    white-space:nowrap;opacity:0;
    transform:translateY(8px) scale(.9);
    transition:opacity .4s ease,transform .4s ease;
    pointer-events:none;
    box-shadow:0 8px 24px rgba(0,0,0,.3);
    z-index:55;max-width:220px;white-space:normal;line-height:1.5;
  }
  #bubble.show{opacity:1;transform:translateY(0) scale(1);}

  /* ── 专注标签入场动画 ── */
  @keyframes focus-pop{
    0%  {opacity:0;transform:scale(.7) translateY(-6px);}
    70% {transform:scale(1.08) translateY(0);}
    100%{opacity:1;transform:scale(1);}
  }
  /* ── 专注计时 ── */
  #focus-tag{
    position:fixed;right:20px;top:20px;
    background:rgba(255,217,128,.18);border:1px solid rgba(255,217,128,.35);
    color:#ffd980;font-size:12px;padding:6px 14px;border-radius:20px;
    opacity:0;transition:opacity .5s;z-index:40;pointer-events:none;
  }
  #focus-tag.show{opacity:1;animation:focus-pop .4s cubic-bezier(.25,.9,.3,1);}

  /* ── 边缘召回 ── */
  #recall-edge{
    position:fixed;right:0;top:50%;transform:translateY(-50%);
    width:36px;height:52px;
    background:rgba(127,216,232,.08);border:1px solid rgba(127,216,232,.2);border-right:none;
    border-radius:12px 0 0 12px;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;cursor:pointer;
    opacity:0;transition:opacity .5s;z-index:60;pointer-events:none;
  }
  #recall-edge.show{opacity:1;pointer-events:all;}
  #recall-edge span{animation:rpulse 2s ease-in-out infinite;}
  @keyframes rpulse{0%,100%{opacity:.45;transform:scale(.9);}50%{opacity:1;transform:scale(1.1);}}

  /* ── 面板把手 ── */
  #panel-handle{
    position:absolute;
    background:rgba(127,216,232,.08);
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:background .2s;
  }
  #panel-handle:hover{background:rgba(127,216,232,.16);}
  #panel.from-bottom #panel-handle{width:52px;height:22px;top:-23px;border-bottom:none;border-radius:10px 10px 0 0;}
  #panel.from-bottom #panel-handle::after,#panel.from-top #panel-handle::after{content:"";display:block;width:24px;height:3px;background:rgba(127,216,232,.38);border-radius:2px;}
  #panel.from-top #panel-handle{width:52px;height:22px;bottom:-23px;border-top:none;border-radius:0 0 10px 10px;}
  #panel.from-right #panel-handle{width:22px;height:52px;left:-23px;border-right:none;border-radius:10px 0 0 10px;}
  #panel.from-right #panel-handle::after,#panel.from-left #panel-handle::after{content:"";display:block;width:3px;height:24px;background:rgba(127,216,232,.38);border-radius:2px;}
  #panel.from-left #panel-handle{width:22px;height:52px;right:-23px;border-left:none;border-radius:0 10px 10px 0;}

  /* ── 控制面板 ── */
  #panel{
    position:fixed;
    background:var(--panel);border:1px solid var(--line);
    backdrop-filter:blur(14px);
    display:flex;flex-direction:column;gap:8px;
    box-shadow:0 0 40px rgba(0,0,0,.55);
    z-index:80;padding:12px 16px 16px;
    overflow:visible;
    transition:transform .45s cubic-bezier(.25,.9,.3,1);
  }
  #panel.from-bottom{left:0;right:0;bottom:0;border-bottom:none;border-radius:20px 20px 0 0;transform:translateY(100%);}
  #panel.from-bottom.show{transform:translateY(0);}
  #panel.from-top{left:0;right:0;top:0;border-top:none;border-radius:0 0 20px 20px;transform:translateY(-100%);}
  #panel.from-top.show{transform:translateY(0);}
  #panel.from-right{right:0;top:0;bottom:0;width:240px;border-right:none;border-radius:20px 0 0 20px;transform:translateX(100%);}
  #panel.from-right.show{transform:translateX(0);}
  #panel.from-left{left:0;top:0;bottom:0;width:240px;border-left:none;border-radius:0 20px 20px 0;transform:translateX(-100%);}
  #panel.from-left.show{transform:translateX(0);}
  .panel-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .panel-title-row{display:flex;align-items:center;justify-content:space-between;}
  .panel-label{font-size:11px;color:var(--ink-dim);width:34px;flex-shrink:0;}
  .btn{font-family:inherit;font-size:12px;background:rgba(127,216,232,.1);color:var(--glow-soft);border:1px solid var(--line);padding:5px 11px;border-radius:9px;cursor:pointer;transition:all .2s;}
  .btn:hover{background:rgba(127,216,232,.22);transform:translateY(-1px);}
  .btn.active{background:var(--glow);color:#06121f;border-color:var(--glow);}
  .btn.warn{color:#ffc4c4;border-color:rgba(255,150,150,.2);}
  .btn.warn:hover{background:rgba(255,100,100,.15);}
  .btn-close{font-family:inherit;font-size:13px;background:none;color:var(--ink-dim);border:none;cursor:pointer;padding:2px 4px;opacity:.5;transition:opacity .2s;}
  .btn-close:hover{opacity:1;}
  .panel-divider{height:1px;background:var(--line);margin:2px 0;}

  /* ── 好奇对话卡 ── */
  #curious-card{
    position:fixed;background:rgba(10,20,50,.96);
    border:1px solid rgba(127,216,232,.28);border-radius:16px;padding:14px 16px 12px;
    z-index:90;width:220px;box-shadow:0 16px 48px rgba(0,0,0,.5);
    backdrop-filter:blur(14px);opacity:0;pointer-events:none;
    transform:translateY(8px) scale(.95);
    transition:opacity .28s ease,transform .28s cubic-bezier(.25,.9,.3,1);
  }
  #curious-card.show{opacity:1;pointer-events:all;transform:translateY(0) scale(1);}
  .cc-q{font-size:12.5px;color:var(--ink-dim);margin-bottom:10px;}
  .cc-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
  .cc-chip{font-family:inherit;font-size:12px;background:rgba(127,216,232,.1);color:var(--glow-soft);border:1px solid rgba(127,216,232,.2);padding:6px 12px;border-radius:18px;cursor:pointer;transition:all .18s;}
  .cc-chip:hover{background:rgba(127,216,232,.22);}
  .cc-close{font-family:inherit;font-size:11px;color:rgba(143,164,196,.4);background:none;border:none;cursor:pointer;width:100%;text-align:center;padding:2px;display:block;}
  .cc-close:hover{color:var(--ink-dim);}

  /* ── 教学卡 ── */
  #tut-card{
    position:fixed;width:256px;background:rgba(10,20,50,.97);
    border:1px solid rgba(127,216,232,.28);border-radius:18px;
    padding:18px 20px 16px;z-index:100;
    box-shadow:0 24px 60px rgba(0,0,0,.55);
    backdrop-filter:blur(16px);display:none;
    animation:tut-in .35s cubic-bezier(.25,.9,.3,1);
  }
  #tut-card.show{display:block;}
  @keyframes tut-in{from{opacity:0;transform:translateY(-10px) scale(.96);}to{opacity:1;transform:none;}}
  #tut-card.step-done{border-color:rgba(127,216,232,.7);}
  .tut-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .tut-progress{font-size:10px;color:rgba(127,216,232,.45);letter-spacing:1.5px;}
  .tut-skip{font-family:inherit;font-size:11px;color:rgba(143,164,196,.4);background:none;border:none;cursor:pointer;}
  .tut-skip:hover{color:var(--ink-dim);}
  .tut-pbar{height:2px;background:rgba(127,216,232,.12);border-radius:2px;margin-bottom:16px;overflow:hidden;}
  .tut-pfill{height:100%;background:var(--glow);border-radius:2px;transition:width .4s ease;}
  .tut-title{font-size:17px;color:var(--ink);font-weight:600;line-height:1.3;margin-bottom:7px;}
  .tut-sub{font-size:12.5px;color:var(--ink-dim);line-height:1.65;margin-bottom:14px;white-space:pre-line;}
  .tut-action-btn{font-family:inherit;font-size:13px;background:var(--glow);color:#06121f;border:none;padding:9px 22px;border-radius:22px;cursor:pointer;width:100%;transition:opacity .2s;display:none;}
  .tut-action-btn.show{display:block;}
  .tut-action-btn:hover{opacity:.88;}
  .tut-waiting{font-size:11px;color:rgba(127,216,232,.45);text-align:center;margin-top:8px;display:none;letter-spacing:.5px;}
  .tut-waiting.show{display:block;animation:tut-wait 2s ease-in-out infinite;}
  @keyframes tut-wait{0%,100%{opacity:.4;}50%{opacity:.9;}}
  .tut-done-flash{font-size:13px;color:var(--glow);text-align:center;margin-top:6px;display:none;}
  .tut-done-flash.show{display:block;animation:flash-in .3s ease;}
  @keyframes flash-in{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:none;}}
  .tut-arrow{font-size:11px;color:rgba(127,216,232,.35);text-align:right;margin-top:10px;animation:arr 1.5s ease-in-out infinite;}
  @keyframes arr{0%,100%{opacity:.35;transform:translateX(0);}50%{opacity:.7;transform:translateX(5px);}}
</style>
</head>
<body>

<div id="focus-tag">专注中 · <span id="focus-time">25:00</span></div>

<div id="jelly-wrap" class="mood-calm">
  <div id="bubble">我在</div>
  <div id="jelly-float">
    <div class="bell"></div>
    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
    <div class="cheeks"><div class="cheek"></div><div class="cheek"></div></div>
    <div class="tentacles">
      <div class="tent"></div><div class="tent"></div><div class="tent"></div>
      <div class="tent"></div><div class="tent"></div>
    </div>
  </div>
</div>

<div id="recall-edge"><span>🪼</span></div>

<div id="panel">
  <div id="panel-handle"></div>
  <div class="panel-title-row">
    <span style="font-size:10px;color:var(--glow);letter-spacing:1px;opacity:.7;">JellyMate</span>
    <button class="btn-close" id="btn-close-panel">✕</button>
  </div>
  <div class="panel-row">
    <button class="btn warn" id="btn-dismiss">退下</button>
    <button class="btn" id="btn-fade">半透明</button>
  </div>
  <div class="panel-divider"></div>
  <div class="panel-row">
    <span class="panel-label">情绪</span>
    <button class="btn active" data-mood="calm">安静</button>
    <button class="btn" data-mood="curious">好奇</button>
    <button class="btn" data-mood="focus">专注</button>
    <button class="btn" data-mood="sleepy">困倦</button>
    <button class="btn" data-mood="happy">开心</button>
  </div>
  <div class="panel-row">
    <span class="panel-label">操作</span>
    <button class="btn" id="btn-focus">⏱ 专注</button>
    <button class="btn" id="btn-tutorial">? 引导</button>
  </div>
</div>

<div id="tut-card">
  <div class="tut-header">
    <span class="tut-progress" id="tut-progress">1 / 8</span>
    <button class="tut-skip" id="tut-skip-btn">跳过</button>
  </div>
  <div class="tut-pbar"><div class="tut-pfill" id="tut-pfill" style="width:0%"></div></div>
  <div class="tut-title" id="tut-title">你好，我是水母 🪼</div>
  <div class="tut-sub" id="tut-sub">住在屏幕角落陪着你\n花 30 秒认识一下我？</div>
  <button class="tut-action-btn show" id="tut-action-btn">认识一下</button>
  <div class="tut-waiting" id="tut-waiting">正在等你操作…</div>
  <div class="tut-done-flash" id="tut-done-flash">✓ 做到了！</div>
  <div class="tut-arrow" id="tut-arrow">向右下角找找我 →</div>
</div>

<div id="curious-card">
  <div class="cc-q">想和我说什么？</div>
  <div class="cc-chips">
    <button class="cc-chip" data-mood="sleepy" data-say="嗯，好好歇歇">今天有点累</button>
    <button class="cc-chip" data-mood="happy"  data-say="那就好" data-spin="1">心情还好</button>
    <button class="cc-chip" data-mood="calm"   data-say="先深呼吸，我在">有点压力</button>
    <button class="cc-chip" data-action="focus">陪我专注</button>
  </div>
  <button class="cc-close" id="cc-close-btn">算了，随便看看你</button>
</div>

<script>
// ── Electron IPC 桥（不在 Electron 里时降级为空函数）──
const api = window.electronAPI || {
  mouseEnterJelly: ()=>{}, mouseLeaveJelly: ()=>{},
  dragMove: ()=>{}, setPosition: ()=>{},
  panelOpen: ()=>{}, panelClose: ()=>{},
};
const IS_ELECTRON = !!window.electronAPI;

// ── 引用 ──
const wrap        = document.getElementById('jelly-wrap');
const bubble      = document.getElementById('bubble');
const focusTag    = document.getElementById('focus-tag');
const focusTimeEl = document.getElementById('focus-time');
const panel       = document.getElementById('panel');
const panelHandle = document.getElementById('panel-handle');
const recallEdge  = document.getElementById('recall-edge');
const eyesEl      = wrap.querySelector('.eyes');

// ── 位置 ──
let posX = 0, posY = 0;
function initPosition(){
  posX = window.innerWidth  - wrap.offsetWidth  - 30;
  posY = window.innerHeight - wrap.offsetHeight - 20;
  applyPos();
}
function applyPos(){
  wrap.style.left = posX + 'px';
  wrap.style.top  = posY + 'px';
}
function animateTo(x, y, dur=1.1){
  wrap.style.transition = `left ${dur}s cubic-bezier(.25,.9,.3,1),top ${dur}s cubic-bezier(.25,.9,.3,1)`;
  posX = x; posY = y; applyPos();
  setTimeout(() => wrap.style.transition = '', dur*1000+50);
}

// ── Mood ──
const MOODS = ['calm','curious','focus','sleepy','happy','poked'];
let currentMood = 'calm', _curiositySource = null, happyTO = null;

const lines = {
  calm:   ['我在','嗯，陪着你','慢慢来就好','没事，我在这'],
  curious:['你找我吗','怎么了','我在听','嗯？'],
  focus:  ['你刚刚很认真','一起加油','我陪你待着'],
  sleepy: ['还没睡呀','早点休息','别太累了'],
  happy:  ['你做到了','今天也辛苦了','见到你真好'],
  poked:  ['诶诶诶！','别戳了啦','我晕了…','你干嘛！','停停停…']
};

function setMood(m, source){
  if(!MOODS.includes(m)) return;
  clearTimeout(happyTO);
  MOODS.forEach(x => wrap.classList.remove('mood-'+x));
  wrap.classList.add('mood-'+m);
  currentMood = m;
  if(m !== 'curious') _curiositySource = null;
  if(source) _curiositySource = source;
  document.querySelectorAll('[data-mood]').forEach(b =>
    b.classList.toggle('active', b.dataset.mood === m));
  if(m === 'happy'){
    happyTO = setTimeout(() => { if(currentMood==='happy') setMood('calm'); }, 5000);
  }
}

// ── 气泡 ──
let bubbleTO = null;
function speak(text, dur=2800){
  bubble.textContent = text;
  bubble.classList.add('show');
  clearTimeout(bubbleTO);
  bubbleTO = setTimeout(() => bubble.classList.remove('show'), dur);
}
function speakMood(){
  const pool = lines[currentMood] || lines.calm;
  speak(pool[Math.floor(Math.random()*pool.length)]);
}

// ── 状态 ──
let isOut = false, isFaded = false, isDismissed = false;

function swimOut(){
  isOut = true;
  animateTo(posX, window.innerHeight - wrap.offsetHeight - 90);
}
function sinkBack(){
  isOut = false;
  animateTo(posX, window.innerHeight - wrap.offsetHeight + 30);
}
function dismiss(){
  isDismissed = true; isFaded = false;
  wrap.classList.remove('faded');
  wrap.style.opacity = '';
  animateTo(window.innerWidth + 200, posY, 1.0);
  wrap.style.opacity = '0.15';
  recallEdge.classList.add('show');
  bubble.classList.remove('show');
  // 退下后让整个窗口穿透（除召回按钮）
  if(IS_ELECTRON) api.mouseLeaveJelly();
}
function recall(){
  isDismissed = false; isFaded = false;
  recallEdge.classList.remove('show');
  wrap.style.opacity = '';
  wrap.classList.remove('faded');
  posX = window.innerWidth - wrap.offsetWidth - 30;
  posY = window.innerHeight - wrap.offsetHeight - 20;
  animateTo(posX, posY);
  setMood('happy'); speak('我回来啦');
  wrap.classList.add('spin');
  setTimeout(() => wrap.classList.remove('spin'), 1500);
  isOut = true;
}
function toggleFade(){
  if(isFaded){
    isFaded = false;
    wrap.classList.remove('faded');
    document.getElementById('btn-fade').textContent = '半透明';
  } else {
    isFaded = true; isDismissed = false;
    recallEdge.classList.remove('show');
    wrap.style.opacity = '';
    wrap.classList.add('faded');
    document.getElementById('btn-fade').textContent = '取消半透明';
  }
}

// ── 鼠标进出水母 → 穿透控制 ──
wrap.addEventListener('mouseenter', () => {
  api.mouseEnterJelly();
  if(isDismissed || drag.active) return;
  clearTimeout(hoverCuriousTO);
  hoverCuriousTO = setTimeout(() => {
    if(['calm','sleepy'].includes(currentMood)){
      setMood('curious','hover');
      if(!isOut) swimOut();
    }
  }, 3000);
});
wrap.addEventListener('mouseleave', () => {
  clearTimeout(hoverCuriousTO);
  // 面板、好奇卡、教学卡任一打开时保持可交互
  if(!panel.classList.contains('show') && !curiousCard.classList.contains('show') && !tutCard.classList.contains('show')){
    api.mouseLeaveJelly();
  }
  if(_curiositySource === 'hover'){
    setTimeout(() => {
      if(currentMood==='curious' && _curiositySource==='hover'){
        setMood('calm'); closeCuriousCard();
      }
    }, 2500);
  }
});

// 面板和卡片显示时保持可交互
function enableInteract(){ api.mouseEnterJelly(); }
function disableInteract(){
  if(!wrap.matches(':hover')) api.mouseLeaveJelly();
}
panel.addEventListener('mouseenter', enableInteract);
panel.addEventListener('mouseleave', () => {
  if(!panel.classList.contains('show') && !wrap.matches(':hover')) api.mouseLeaveJelly();
});
recallEdge.addEventListener('mouseenter', enableInteract);
recallEdge.addEventListener('mouseleave', () => {
  if(!wrap.matches(':hover') && !panel.classList.contains('show')) api.mouseLeaveJelly();
});

let hoverCuriousTO = null;

// ── 拖拽 ──
const drag = {
  active:false, moved:false, longFired:false,
  sx:0, sy:0, ox:0, oy:0, tx:0, ty:0,
  startTime:0, longTO:null, rafId:null
};

function dragTick(){
  if(!drag.active) return;
  posX += (drag.tx - posX) * 0.17;
  posY += (drag.ty - posY) * 0.17;
  wrap.style.left = posX + 'px';
  wrap.style.top  = posY + 'px';
  drag.rafId = requestAnimationFrame(dragTick);
}

wrap.addEventListener('mousedown', onDown);
document.addEventListener('mousemove', onMove);
document.addEventListener('mouseup', onUp);

function onDown(e){
  if(e.button !== 0) return;
  e.preventDefault();
  drag.active=true; drag.moved=false; drag.longFired=false;
  drag.sx=e.clientX; drag.sy=e.clientY;
  drag.ox=posX; drag.oy=posY;
  drag.tx=posX; drag.ty=posY;
  drag.startTime=Date.now();
  wrap.classList.add('pressing');
  drag.longTO = setTimeout(onLongPress, 750);
  drag.rafId = requestAnimationFrame(dragTick);
}
function onMove(e){
  mouseX=e.clientX; mouseY=e.clientY;
  if(!drag.active) return;
  const dx=e.clientX-drag.sx, dy=e.clientY-drag.sy;
  if(!drag.moved && (Math.abs(dx)>6||Math.abs(dy)>6)){
    drag.moved=true;
    clearTimeout(drag.longTO);
    wrap.classList.remove('pressing');
    wrap.classList.add('dragging');
    wrap.style.transition='none';
  }
  if(drag.moved){ drag.tx=drag.ox+dx; drag.ty=drag.oy+dy; }
}
function onUp(e){
  if(!drag.active) return;
  clearTimeout(drag.longTO);
  cancelAnimationFrame(drag.rafId);
  drag.active=false;
  wrap.classList.remove('pressing','dragging');
  if(drag.longFired) return;
  if(drag.moved) endDrag();
  else recordClick();
}
function endDrag(){
  const W=window.innerWidth, H=window.innerHeight;
  const cx=posX+wrap.offsetWidth/2, cy=posY+wrap.offsetHeight/2;
  let nx=posX, ny=posY;
  if(cx>W-100) nx=W-wrap.offsetWidth*.6;
  else if(cx<100) nx=-wrap.offsetWidth*.4;
  if(cy>H-100){ ny=H-wrap.offsetHeight*.25; isOut=false; }
  ny=Math.max(-wrap.offsetHeight*.5, Math.min(ny, H-30));
  nx=Math.max(-wrap.offsetWidth*.5,  Math.min(nx, W-30));
  animateTo(nx, ny, 0.7);
  if(!panel.classList.contains('show')) setTimeout(()=>applyPanelEdge(getJellyEdge()), 750);
  tutSignal('drag');
}
function onLongPress(){
  drag.longFired=true;
  wrap.classList.remove('pressing');
  if(!panel.classList.contains('show')) openPanel();
  tutSignal('longpress');
}

// ── 点击频率 ──
let clickCount=0, clickTO=null;
function recordClick(){
  clickCount++;
  clearTimeout(clickTO);
  if(clickCount>=4){ onPokedRepeatedly(); clickCount=0; return; }
  clickTO = setTimeout(()=>{
    if(clickCount===1)      onSingleClick();
    else if(clickCount===2) onDoubleClick();
    else if(clickCount===3) onTripleClick();
    clickCount=0;
  }, 290);
}
function onSingleClick(){
  if(isDismissed) return;
  if(isFaded){ toggleFade(); return; }
  if(currentMood==='curious'){ openCuriousCard(); tutSignal('tap'); return; }
  if(!isOut) swimOut();
  speakMood(); tutSignal('tap');
}
function onDoubleClick(){
  if(isDismissed) return;
  wrap.classList.add('spin');
  setTimeout(()=>wrap.classList.remove('spin'),1400);
  if(focusTimer){
    clearInterval(focusTimer); focusTimer=null;
    focusTag.classList.remove('show');
    setMood('calm'); speak('好，休息一下吧',2800);
  } else {
    if(!isOut) swimOut(); startFocus();
  }
  tutSignal('dbl');
}
function onTripleClick(){
  if(isDismissed) return;
  toggleFade();
}
function onPokedRepeatedly(){
  if(isDismissed) return;
  if(!isOut) swimOut();
  setMood('poked');
  wrap.classList.add('poked');
  speak(lines.poked[Math.floor(Math.random()*lines.poked.length)],2200);
  setTimeout(()=>{ wrap.classList.remove('poked'); setMood('curious','user'); },2200);
  tutSignal('poked');
}

// ── 眼球追踪 + 靠近 ──
let mouseX=0, mouseY=0, nearState=false, nearTO=null;
document.addEventListener('mousemove', e=>{ mouseX=e.clientX; mouseY=e.clientY; });
if(IS_ELECTRON) api.onCursorPos((x,y)=>{ mouseX=x; mouseY=y; });

function proximityTick(){
  const rect=wrap.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+75;
  const dx=mouseX-cx, dy=mouseY-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>0 && dist<500){
    const str=Math.max(0,1-dist/500);
    const ox=(dx/dist)*6*str, oy=(dy/dist)*6*str;
    eyesEl.style.transform=`translateX(calc(-50% + ${ox.toFixed(2)}px)) translateY(${oy.toFixed(2)}px)`;
  } else {
    eyesEl.style.transform='translateX(-50%)';
  }
  if(dist<260 && !nearState){
    nearState=true; wrap.classList.add('near');
    if(dist<130 && currentMood==='calm' && !drag.active) setMood('curious','proximity');
    tutSignal('proximity');
  } else if(dist>=300 && nearState){
    nearState=false; wrap.classList.remove('near');
    clearTimeout(nearTO);
    if(_curiositySource==='proximity'){
      nearTO=setTimeout(()=>{ if(currentMood==='curious' && _curiositySource==='proximity') setMood('calm'); },2200);
    }
  }
}
setInterval(proximityTick, 32);

// ── 好奇对话卡 ──
const curiousCard = document.getElementById('curious-card');
function openCuriousCard(){
  const rect=wrap.getBoundingClientRect();
  const cw=228, gap=14;
  let left=rect.left-cw-gap, top=rect.top+rect.height/2-80;
  if(left<10) left=rect.right+gap;
  if(left+cw>window.innerWidth-10) left=Math.max(10,rect.left-cw-gap);
  top=Math.max(10,Math.min(top,window.innerHeight-180));
  curiousCard.style.left=left+'px'; curiousCard.style.top=top+'px';
  curiousCard.classList.add('show');
  api.mouseEnterJelly();
}
function closeCuriousCard(){
  curiousCard.classList.remove('show');
}
document.querySelectorAll('.cc-chip').forEach(btn=>{
  btn.addEventListener('click',()=>{
    closeCuriousCard();
    const action=btn.dataset.action;
    if(action==='focus'){ if(!isOut) swimOut(); startFocus(); return; }
    if(btn.dataset.mood) setMood(btn.dataset.mood,'user');
    if(btn.dataset.say) speak(btn.dataset.say,3200);
    if(btn.dataset.spin){ wrap.classList.add('spin'); setTimeout(()=>wrap.classList.remove('spin'),1400); }
  });
});
document.getElementById('cc-close-btn').addEventListener('click',()=>{
  closeCuriousCard(); speak('好，我在这儿',2000);
});

// ── 离开 / 回来 ──
let userWasAway=false, returnDebounce=null;
let lastReturnTime=0;
const RETURN_COOLDOWN=10*60*1000;

function onUserReturned(){
  if(!userWasAway) return;
  userWasAway=false;
  clearTimeout(returnDebounce);
  returnDebounce=setTimeout(()=>{
    if(isDismissed) return;
    const now=Date.now();
    const bigReturn=now-lastReturnTime>RETURN_COOLDOWN;
    lastReturnTime=now;
    const wasOut=isOut;
    if(bigReturn){
      if(isOut) sinkBack();
      setTimeout(()=>{
        swimOut(); setMood('happy');
        wrap.classList.add('spin'); speak('你回来了，我还在');
        setTimeout(()=>wrap.classList.remove('spin'),1500);
        if(!wasOut) setTimeout(()=>sinkBack(),5000);
      }, isOut?900:0);
    } else {
      if(!isOut) swimOut();
      speak(lines.calm[Math.floor(Math.random()*lines.calm.length)],2000);
    }
  },400);
}
document.addEventListener('mouseleave',()=>{ userWasAway=true; });
document.addEventListener('mouseenter',onUserReturned);
document.addEventListener('visibilitychange',()=>{
  if(document.hidden) userWasAway=true; else onUserReturned();
});
window.addEventListener('blur',()=>{ userWasAway=true; });
window.addEventListener('focus',onUserReturned);

// ── 面板（方向跟随水母）──
const EDGES=['bottom','top','right','left'];
let prePanelPosX=0, prePanelPosY=0;

function getJellyEdge(){
  const W=window.innerWidth, H=window.innerHeight;
  const cx=posX+wrap.offsetWidth/2, cy=posY+wrap.offsetHeight/2;
  const dists={bottom:H-cy,top:cy,right:W-cx,left:cx};
  return Object.entries(dists).sort((a,b)=>a[1]-b[1])[0][0];
}
function applyPanelEdge(edge){
  EDGES.forEach(e=>panel.classList.remove('from-'+e));
  panel.classList.add('from-'+edge);
  if(['bottom','top'].includes(edge)){
    const hx=Math.min(Math.max(posX+wrap.offsetWidth/2-26,12),window.innerWidth-64);
    panelHandle.style.left=hx+'px'; panelHandle.style.top='';
  } else {
    const hy=Math.min(Math.max(posY+wrap.offsetHeight/2-26,12),window.innerHeight-64);
    panelHandle.style.top=hy+'px'; panelHandle.style.left='';
  }
}
function openPanel(){
  const edge=getJellyEdge();
  applyPanelEdge(edge);
  prePanelPosX=posX; prePanelPosY=posY;
  const dx=edge==='right'?-170:edge==='left'?170:0;
  const dy=edge==='bottom'?-188:edge==='top'?188:0;
  animateTo(posX+dx,posY+dy,0.4);
  panel.classList.add('show');
  api.panelOpen();
}
function closePanel(){
  panel.classList.remove('show');
  animateTo(prePanelPosX,prePanelPosY,0.4);
  api.panelClose();
}
panelHandle.addEventListener('click',()=>
  panel.classList.contains('show')?closePanel():openPanel());

document.querySelectorAll('[data-mood]').forEach(b=>
  b.addEventListener('click',()=>setMood(b.dataset.mood,'user')));

// ── 专注 ──
let focusTimer=null;
function startFocus(){
  if(focusTimer) return;
  setMood('focus','user'); speak('陪你专注，我在', 3200);
  focusTag.classList.add('show');
  let total=25*60;
  focusTimer=setInterval(()=>{
    total--;
    if(total<=0){
      clearInterval(focusTimer); focusTimer=null;
      focusTag.classList.remove('show');
      setMood('happy'); wrap.classList.add('spin');
      speak('你专注了 25 分钟，真棒');
      setTimeout(()=>wrap.classList.remove('spin'),1500);
      return;
    }
    const mm=String(Math.floor(total/60)).padStart(2,'0');
    const ss=String(total%60).padStart(2,'0');
    focusTimeEl.textContent=mm+':'+ss;
  },1000);
}
document.getElementById('btn-close-panel').addEventListener('click', closePanel);
document.getElementById('btn-focus').addEventListener('click',()=>{ if(!isOut) swimOut(); startFocus(); closePanel(); });
document.getElementById('btn-dismiss').addEventListener('click',()=>{ panel.classList.remove('show'); api.panelClose(); dismiss(); });
document.getElementById('btn-fade').addEventListener('click',toggleFade);
recallEdge.addEventListener('click',recall);
document.getElementById('btn-tutorial').addEventListener('click',()=>{ closePanel(); startTutorial(); });

// ── 自动困倦 ──
let idleTO=null;
function resetIdle(){
  clearTimeout(idleTO);
  idleTO=setTimeout(()=>{ if(!focusTimer && currentMood!=='poked') setMood('sleepy'); },60000);
}
['click','mousemove','keydown'].forEach(ev=>document.addEventListener(ev,resetIdle));
resetIdle();

// 深夜困倦
function checkNightMood(){
  const h=new Date().getHours();
  if(!focusTimer && (h>=23||h<8)) setMood('sleepy');
}
checkNightMood();
setInterval(checkNightMood,5*60*1000);

// ════════════ 新手教学 ════════════
const TUT_STEPS=[
  {title:'你好，我是水母 🪼',sub:'住在屏幕角落陪着你\n花 30 秒认识一下我？',wait:'btn',btn:'认识一下',arrow:''},
  {title:'把鼠标慢慢靠近我',sub:'越近越好，我会注意到你的',wait:'proximity',arrow:'向右下角的我靠近 →'},
  {title:'轻点一下我',sub:'就像戳一下，打个招呼',wait:'tap',arrow:'单击我 →'},
  {title:'双击我',sub:'开始 25 分钟专注陪伴\n再次双击可随时退出',wait:'dbl',arrow:'双击我 →'},
  {title:'拖着我换个地方',sub:'我可以住在屏幕任意角落\n贴近边缘会自动吸附',wait:'drag',arrow:'按住拖动我 →'},
  {title:'快速连点我 4 次',sub:'看看我会有什么反应…',wait:'poked',arrow:'4 次快速点击 →'},
  {title:'长按我 0.8 秒',sub:'打开更多选项面板',wait:'longpress',arrow:'长按我 →'},
  {title:'认识完了 ✦',sub:'之后长按随时找我\n鼠标离开再回来，我也会认出你',wait:'btn',btn:'开始陪伴',arrow:''}
];
// 教学卡片显示时保持可交互
const tutCard=document.getElementById('tut-card');
tutCard.addEventListener('mouseenter', ()=> api.mouseEnterJelly());
tutCard.addEventListener('mouseleave', ()=>{
  if(!wrap.matches(':hover') && !panel.classList.contains('show')) api.mouseLeaveJelly();
});
const tutTitle=document.getElementById('tut-title');
const tutSub=document.getElementById('tut-sub');
const tutActionBtn=document.getElementById('tut-action-btn');
const tutWaitEl=document.getElementById('tut-waiting');
const tutDoneEl=document.getElementById('tut-done-flash');
const tutArrow=document.getElementById('tut-arrow');
const tutPfill=document.getElementById('tut-pfill');
const tutProgress=document.getElementById('tut-progress');

tutActionBtn.addEventListener('click',()=>{
  if(!tutActive) return;
  if(tutStep<TUT_STEPS.length-1) advanceTutorial(); else endTutorial();
});
document.getElementById('tut-skip-btn').addEventListener('click',endTutorial);

function startTutorial(){
  tutActive=true; tutStep=0;
  tutCard.classList.add('show');
  if(isDismissed) recall();
  showTutStep(0);
}
function repositionTutCard(){
  const rect=wrap.getBoundingClientRect();
  const cw=264,ch=220,gap=16;
  let left=rect.left-cw-gap, top=rect.top+(rect.height-ch)/2;
  if(left<12) left=rect.right+gap;
  if(left+cw>window.innerWidth-12) left=Math.max(12,rect.left+(rect.width-cw)/2);
  top=Math.max(12,Math.min(top,window.innerHeight-ch-12));
  tutCard.style.left=left+'px'; tutCard.style.top=top+'px';
}
function showTutStep(i){
  const step=TUT_STEPS[i];
  tutWaiting=step.wait!=='btn';
  tutTitle.textContent=step.title;
  tutSub.textContent=step.sub.replace(/\\n/g,'\n');
  tutArrow.textContent=step.arrow;
  tutArrow.style.display=step.arrow?'':'none';
  tutProgress.textContent=`${i+1} / ${TUT_STEPS.length}`;
  tutPfill.style.width=((i/(TUT_STEPS.length-1))*100).toFixed(0)+'%';
  if(step.wait==='btn'){
    tutActionBtn.textContent=step.btn||'下一步';
    tutActionBtn.classList.add('show'); tutWaitEl.classList.remove('show');
  } else {
    tutActionBtn.classList.remove('show'); tutWaitEl.classList.add('show');
  }
  tutDoneEl.classList.remove('show'); tutCard.classList.remove('step-done');
  wrap.classList.add('tut-active');
  repositionTutCard();
  api.mouseEnterJelly();
}
function tutSignal(type){
  if(!tutActive||!tutWaiting) return;
  if(TUT_STEPS[tutStep].wait!==type) return;
  advanceTutorial();
}
function advanceTutorial(){
  tutWaiting=false; tutWaitEl.classList.remove('show');
  tutDoneEl.classList.add('show'); tutCard.classList.add('step-done');
  wrap.classList.add('tut-success','spin');
  setTimeout(()=>{
    wrap.classList.remove('spin','tut-success'); tutCard.classList.remove('step-done');
    tutDoneEl.classList.remove('show'); tutStep++;
    if(tutStep>=TUT_STEPS.length) endTutorial(); else showTutStep(tutStep);
  },900);
}
function endTutorial(){
  tutActive=false; tutWaiting=false;
  tutCard.classList.remove('show');
  wrap.classList.remove('tut-active','tut-success');
  speak('很高兴认识你 🪼',3000); setMood('happy');
}

// ── 初始化 ──
initPosition();
applyPanelEdge(getJellyEdge());
setTimeout(()=>speak('我在',2200),600);
</script>
